version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: deliverx-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=DeliverX
    networks:
      - deliverx-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: deliverx-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/DeliverX
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - deliverx-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: deliverx-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - deliverx-network

volumes:
  mongodb_data:
    driver: local

networks:
  deliverx-network:
    driver: bridge
